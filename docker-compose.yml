# ExcellentInsight - Full Stack Deployment
#
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 cache/queue
#   - backend: FastAPI application
#   - worker: Background job processor (ARQ)
#   - frontend: Next.js 15 application
#
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f      # View logs
#   docker-compose down         # Stop all services

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: excellent_insight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env  # Create from .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/excellent_insight
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

  worker:
    build: .
    env_file:
      - .env  # Create from .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/excellent_insight
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.workers.settings.WorkerSettings

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      - "3000:3000"
    env_file:
      - ./frontend/.env.local  # Create from .env.local.example
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads:
