# ExcellentInsight - Full Stack Deployment
#
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 cache/queue
#   - backend: FastAPI application
#   - worker: Background job processor (ARQ)
#   - frontend: Next.js 15 application
#
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f      # View logs
#   docker-compose down         # Stop all services

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-excellent_insight}
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only for security
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only for security
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Init container to fix volume permissions for the non-root appuser
  init-uploads:
    image: alpine:latest
    command: /bin/sh -c "chown -R 114:65534 /app/uploads && chmod -R 775 /app/uploads"
    volumes:
      - uploads:/app/uploads
    restart: "no"

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"  # Bind to localhost only (reverse proxy should handle external access)
    env_file:
      - .env  # Create from .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-excellent_insight}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    volumes:
      - uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-uploads:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env  # Create from .env.example
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-excellent_insight}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    volumes:
      - uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-uploads:
        condition: service_completed_successfully
    command: arq app.workers.settings.WorkerSettings

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://excellentinsight.onthewifi.com/api/v1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only (reverse proxy should handle external access)
    env_file:
      - ./frontend/.env.local  # Create from .env.local.example
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://excellentinsight.onthewifi.com/api/v1}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads:
